<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAZANTIP — ПОИСК СИГНАЛА</title>
<meta name="description" content="Найди свою частоту. Вступи в Республику.">
<meta property="og:title" content="KAZANTIP — ПОИСК СИГНАЛА">
<meta property="og:description" content="Найди свою частоту. Вступи в Республику.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --surface:#121318;
    --surface-dim:#121318;
    --surface-bright:#38393f;
    --surface-container-lowest:#0d0e13;
    --surface-container-low:#1a1b21;
    --surface-container:#1e1f25;
    --surface-container-high:#292a2f;
    --surface-container-highest:#34343a;
    --on-surface:#e3e1e9;
    --on-surface-variant:#d0c6ab;
    --primary:#fff6df;
    --on-primary:#3a3000;
    --primary-container:#ffd700;
    --on-primary-container:#705e00;
    --secondary:#bdf4ff;
    --on-secondary:#00363d;
    --secondary-container:#00e3fd;
    --on-secondary-container:#00616d;
    --tertiary:#fcf3ff;
    --tertiary-container:#e7d1ff;
    --outline:#999077;
    --outline-variant:#4d4732;
    --error:#ffb4ab;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
    height:100%;
    background:var(--surface);
    color:var(--on-surface);
    font-family:'Inter',sans-serif;
    overflow:hidden;
    touch-action:none;
    -webkit-font-smoothing:antialiased;
}

/* === CELESTIAL BACKGROUND === */
.celestial-bg{
    position:fixed;
    inset:0;
    background:
        radial-gradient(ellipse 80% 50% at 50% 50%, rgba(26,27,33,0.8) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 70% 30%, rgba(255,246,223,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 30% 70%, rgba(0,227,253,0.02) 0%, transparent 50%),
        var(--surface);
    z-index:0;
}

/* === STATIC / SNOW (TV NOISE) === */
#tv-static{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    opacity:0;
    transition:opacity .3s;
}
#tv-static.active{opacity:0.15}

/* === SCAN LINES === */
.scanlines{
    position:fixed;
    inset:0;
    z-index:3;
    pointer-events:none;
    background:repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
    );
    opacity:0.3;
}

/* === STARS === */
.stars{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:var(--primary);
    border-radius:50%;
    opacity:0;
    animation:twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:0.8}}

/* === MOON === */
.moon{
    position:fixed;
    top:15%;
    right:20%;
    width:60px;
    height:60px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--primary), rgba(255,246,223,0.3));
    box-shadow:0 0 40px rgba(255,246,223,0.2),0 0 80px rgba(255,246,223,0.1);
    z-index:1;
    opacity:0.6;
    transition:all 1s ease;
}
.moon.glow{
    opacity:1;
    box-shadow:0 0 60px rgba(255,246,223,0.5),0 0 120px rgba(255,246,223,0.3),0 0 200px rgba(255,246,223,0.1);
    transform:scale(1.1);
}

/* === GLITCH OVERLAY === */
.glitch-overlay{
    position:fixed;
    inset:0;
    z-index:8;
    pointer-events:none;
    opacity:0;
    transition:opacity .1s;
    mix-blend-mode:screen;
}
.glitch-overlay.active{opacity:0.3}

/* === MAIN UI === */
#stage1{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    transition:opacity 1.2s cubic-bezier(0.4,0,0.2,1);
}
#stage1.hidden{opacity:0;pointer-events:none}

.status-bar{
    position:fixed;
    top:32px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    text-align:center;
}

.status-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 20px;
    border-radius:9999px;
    background:rgba(255,246,223,0.05);
    border:1px solid rgba(255,246,223,0.1);
    transition:all .5s;
}
.status-pill.locking{
    background:rgba(0,227,253,0.1);
    border-color:rgba(0,227,253,0.3);
    box-shadow:0 0 20px rgba(0,227,253,0.2);
}

.status-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--outline);
    animation:statusPulse 2s infinite;
}
.status-dot.scanning{background:var(--primary-container);box-shadow:0 0 8px var(--primary-container)}
.status-dot.near{background:#ff8c00;box-shadow:0 0 12px #ff8c00}
.status-dot.locking{
    background:var(--secondary-container);
    box-shadow:0 0 16px var(--secondary-container);
    animation:lockPulse 0.5s infinite;
}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes lockPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

.display-xl{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(2.5rem,8vw,4.5rem);
    font-weight:700;
    line-height:1.1;
    letter-spacing:-0.04em;
    color:var(--primary);
    text-shadow:0 0 40px rgba(255,246,223,0.15);
    margin-bottom:10px;
}

.label{
    font-family:'Space Grotesk',sans-serif;
    font-size:0.7rem;
    font-weight:500;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--on-surface-variant);
}

/* === RADAR / SCANNER === */
.scanner-container{
    position:relative;
    width:280px;
    height:280px;
    margin:30px 0;
}

.scanner-ring{
    position:absolute;
    inset:0;
    border:1px solid rgba(153,144,119,0.1);
    border-radius:50%;
}
.scanner-ring:nth-child(2){inset:35px}
.scanner-ring:nth-child(3){inset:70px}

.scanner-sweep{
    position:absolute;
    inset:0;
    border-radius:50%;
    overflow:hidden;
}
.scanner-sweep::after{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    width:50%;
    height:1px;
    background:linear-gradient(90deg,rgba(0,227,253,0.5),transparent);
    transform-origin:left center;
    animation:sweep 3s linear infinite;
}
@keyframes sweep{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* === SIGNAL CORE (ELLIPSE PORTAL) === */
.signal-core{
    position:absolute;
    inset:50%;
    width:120px;
    height:160px;
    margin:-60px -80px;
    border-radius:50%;
    overflow:hidden;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(255,246,223,0.1);
    transition:all .5s ease;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Ellipse mask for video */
.signal-core.ellipse{
    border-radius:50%;
    box-shadow:0 0 30px rgba(255,246,223,0.1),inset 0 0 30px rgba(0,0,0,0.5);
}

.signal-core.locking{
    border-color:rgba(0,227,253,0.5);
    box-shadow:0 0 40px rgba(0,227,253,0.3),0 0 80px rgba(0,227,253,0.1),inset 0 0 40px rgba(0,0,0,0.5);
    transform:scale(1.3);
}

.signal-core.locked{
    border-color:rgba(0,227,253,0.8);
    box-shadow:0 0 60px rgba(0,227,253,0.5),0 0 120px rgba(0,227,253,0.2),inset 0 0 40px rgba(0,0,0,0.5);
    transform:scale(1.5);
    animation:portalBreath 3s ease-in-out infinite;
}
@keyframes portalBreath{0%,100%{box-shadow:0 0 60px rgba(0,227,253,0.5)}50%{box-shadow:0 0 80px rgba(0,227,253,0.7)}}

/* Video inside ellipse */
#portalVideo{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1s;
    filter:contrast(1.2) saturate(1.3);
}
#portalVideo.active{opacity:1}

/* Glitch effect on video */
#portalVideo.glitching{
    animation:videoGlitch 0.2s infinite;
}
@keyframes videoGlitch{
    0%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}100%{transform:translate(0)}
}

.freq-value{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.8rem;
    font-weight:700;
    color:var(--on-surface-variant);
    transition:all .3s;
    z-index:5;
}
.freq-value.near{color:var(--primary);text-shadow:0 0 20px rgba(255,246,223,.3)}
.freq-value.locking{color:var(--secondary-container);text-shadow:0 0 30px rgba(0,227,253,.5)}

/* === SCANNER READOUT === */
.scanner-readout{
    position:fixed;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    text-align:center;
    font-family:'Space Grotesk',monospace;
    font-size:0.75rem;
    color:var(--outline);
    letter-spacing:0.1em;
    opacity:0.7;
}

.readout-line{
    margin:3px 0;
}

.readout-value{
    color:var(--on-surface-variant);
}
.readout-value.hot{color:var(--primary-container)}
.readout-value.locking{color:var(--secondary-container)}

/* === INTERFERENCE (OTHER UNIVERSES) === */
.interference{
    position:fixed;
    inset:0;
    z-index:15;
    pointer-events:none;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .2s;
}
.interference.active{opacity:1}

.interference-text{
    font-family:'Space Grotesk',sans-serif;
    font-size:0.8rem;
    color:var(--primary-container);
    text-shadow:0 0 10px rgba(255,215,0,0.5);
    letter-spacing:0.2em;
    text-transform:uppercase;
    text-align:center;
    animation:interferenceFlicker 0.1s infinite;
    max-width:80%;
}
@keyframes interferenceFlicker{0%,100%{opacity:1}50%{opacity:0.3}}

/* === DIRECTION ARROW === */
.compass{
    position:fixed;
    bottom:180px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    text-align:center;
    transition:all .5s;
}

.compass-ring{
    width:80px;
    height:80px;
    border:1px solid rgba(153,144,119,0.2);
    border-radius:50%;
    position:relative;
    margin:0 auto 10px;
}

.compass-arrow{
    position:absolute;
    top:50%;
    left:50%;
    width:2px;
    height:30px;
    background:var(--outline);
    transform-origin:bottom center;
    transform:translate(-50%,-100%) rotate(0deg);
    transition:all .3s;
}
.compass-arrow::after{
    content:'';
    position:absolute;
    top:-6px;
    left:50%;
    transform:translateX(-50%);
    border-left:5px solid transparent;
    border-right:5px solid transparent;
    border-bottom:8px solid var(--outline);
}
.compass-arrow.hot{
    background:var(--primary-container);
}
.compass-arrow.hot::after{
    border-bottom-color:var(--primary-container);
}

.compass-label{
    font-family:'Space Grotesk',sans-serif;
    font-size:0.65rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--outline);
}

/* === START BUTTON === */
.start-btn{
    margin-top:40px;
    padding:16px 48px;
    background:transparent;
    color:var(--primary);
    border:1px solid rgba(255,246,223,0.3);
    border-radius:12px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.875rem;
    font-weight:500;
    letter-spacing:0.12em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .3s ease;
    position:relative;
    overflow:hidden;
}
.start-btn:hover{
    border-color:rgba(255,246,223,0.6);
    box-shadow:0 0 30px rgba(255,246,223,0.1);
}

/* === LOCK BUTTON === */
.lock-btn{
    position:fixed;
    bottom:48px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    padding:14px 40px;
    background:var(--primary-container);
    color:var(--on-primary-container);
    border:none;
    border-radius:12px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.8rem;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:all .4s cubic-bezier(0.4,0,0.2,1);
    box-shadow:0 4px 20px rgba(255,215,0,0.3);
    z-index:20;
}
.lock-btn.visible{
    opacity:1;
    pointer-events:auto;
    transform:translateX(-50%) translateY(0);
}

/* === STAGE 2: FORM === */
#stage2{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 1s cubic-bezier(0.4,0,0.2,1);
    z-index:50;
    padding:20px;
}
#stage2.active{opacity:1;pointer-events:auto}

.glass-strong{
    background:rgba(52,52,58,0.4);
    backdrop-filter:blur(40px);
    -webkit-backdrop-filter:blur(40px);
    border:1px solid rgba(255,255,255,0.12);
}

.form-container{
    width:100%;
    max-width:420px;
    padding:48px;
    border-radius:16px;
}

.form-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.75rem;
    font-weight:600;
    letter-spacing:-0.02em;
    color:var(--primary);
    margin-bottom:8px;
    text-align:center;
}

.form-subtitle{
    font-family:'Inter',sans-serif;
    font-size:0.9375rem;
    color:var(--on-surface-variant);
    margin-bottom:40px;
    text-align:center;
}

.form-group{
    margin-bottom:24px;
}

.form-group label{
    display:block;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.6875rem;
    font-weight:500;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--on-surface-variant);
    margin-bottom:10px;
}

.form-group input{
    width:100%;
    padding:14px 16px;
    background:var(--surface-container-lowest);
    border:1px solid rgba(153,144,119,0.2);
    border-radius:12px;
    color:var(--on-surface);
    font-family:'Inter',sans-serif;
    font-size:0.9375rem;
    outline:none;
    transition:all .3s ease;
}

.form-group input:focus{
    border-color:var(--secondary-container);
    box-shadow:0 0 0 3px rgba(0,227,253,0.1),0 0 20px rgba(0,227,253,0.1);
}

.form-group input::placeholder{
    color:rgba(153,144,119,0.5);
}

.submit-btn{
    width:100%;
    padding:16px;
    background:var(--primary-container);
    color:var(--on-primary-container);
    border:none;
    border-radius:12px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.875rem;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .3s ease;
    margin-top:16px;
}

.submit-btn:hover{
    box-shadow:0 4px 24px rgba(255,215,0,0.4),0 0 40px rgba(255,215,0,0.15);
    transform:translateY(-1px);
}

/* === NOISE === */
.noise{
    position:fixed;
    inset:0;
    z-index:4;
    pointer-events:none;
    opacity:.03;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* === SIGNAL BARS (TV STYLE) === */
.signal-bars{
    position:fixed;
    top:50%;
    right:20px;
    transform:translateY(-50%);
    z-index:20;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.signal-bar{
    width:4px;
    background:rgba(153,144,119,0.2);
    border-radius:2px;
    transition:all .3s;
}
.signal-bar.active{
    background:var(--secondary-container);
    box-shadow:0 0 6px rgba(0,227,253,0.5);
}
.signal-bar.hot{
    background:var(--primary-container);
    box-shadow:0 0 6px rgba(255,215,0,0.5);
}

/* === HORIZONTAL SCAN LINE === */
.scan-line{
    position:fixed;
    left:0;
    right:0;
    height:2px;
    background:linear-gradient(90deg,transparent,rgba(0,227,253,0.3),transparent);
    z-index:7;
    pointer-events:none;
    opacity:0;
    transition:opacity .2s;
}
.scan-line.active{opacity:1}

/* === DEBUG === */
#dbg{
    position:fixed;
    bottom:10px;
    right:10px;
    font-size:9px;
    color:rgba(153,144,119,0.4);
    z-index:100;
    font-family:monospace;
    text-align:right;
    line-height:1.4;
}
</style>
</head>
<body>

<div class="celestial-bg"></div>
<div class="stars" id="stars"></div>
<div class="moon" id="moon"></div>
<div class="scanlines"></div>
<div class="noise"></div>

<canvas id="tv-static"></canvas>

<div class="glitch-overlay" id="glitchOverlay"></div>
<div class="scan-line" id="scanLine"></div>

<!-- Interference from other universes -->
<div class="interference" id="interference">
    <div class="interference-text" id="interferenceText">СИГНАЛ ИЗ ДРУГОЙ ВСЕЛЕННОЙ</div>
</div>

<!-- STAGE 1: Signal Detection -->
<div id="stage1">
    
    <div class="scanner-readout" id="scannerReadout">
        <div class="readout-line">AZIMUTH: <span class="readout-value" id="readoutAlpha">---</span>°</div>
        <div class="readout-line">ELEVATION: <span class="readout-value" id="readoutBeta">---</span>°</div>
        <div class="readout-line">SIGNAL: <span class="readout-value" id="readoutSignal">SCANNING</span></div>
    </div>
    
    <div class="status-bar">
        <div class="status-pill" id="statusPill">
            <div class="status-dot" id="statusDot"></div>
            <span class="label" id="statusText">ОЖИДАНИЕ СИГНАЛА</span>
        </div>
    </div>
    
    <div class="display-xl" id="mainTitle">SOOON</div>
    
    <div id="setup">
        <button class="start-btn" id="startBtn">Поймать Сигнал</button>
        <div style="margin-top:12px;font-size:0.65rem;color:var(--outline);letter-spacing:0.1em;opacity:0.5">НАПРАВЬ ТЕЛЕФОН НА ЮГ, К ЛУНЕ</div>
    </div>
    
    <div id="gameUI" style="display:none;flex-direction:column;align-items:center;width:100%">
        
        <div class="scanner-container">
            <div class="scanner-ring"></div>
            <div class="scanner-ring"></div>
            <div class="scanner-ring"></div>
            <div class="scanner-sweep"></div>
            
            <div class="signal-core ellipse" id="signalCore">
                <video id="portalVideo" loop muted playsinline poster="">
                    <source src="signal-portal.mp4" type="video/mp4">
                </video>
                <div class="freq-value" id="freqDisplay">0%</div>
            </div>
        </div>
        
        <!-- Signal bars -->
        <div class="signal-bars" id="signalBars">
            <div class="signal-bar" style="height:8px"></div>
            <div class="signal-bar" style="height:16px"></div>
            <div class="signal-bar" style="height:24px"></div>
            <div class="signal-bar" style="height:32px"></div>
            <div class="signal-bar" style="height:40px"></div>
        </div>
        
        <!-- Compass -->
        <div class="compass" id="compass">
            <div class="compass-ring">
                <div class="compass-arrow" id="compassArrow"></div>
            </div>
            <div class="compass-label" id="compassLabel">ПОВЕРНИ К ЮГУ</div>
        </div>
        
        <button class="lock-btn" id="lockBtn">Фиксировать Сигнал</button>
    </div>
</div>

<!-- STAGE 2: Form -->
<div id="stage2">
    <div class="form-container glass-strong">
        <div class="form-title">Вступить в Республику</div>
        <div class="form-subtitle">Оставь координаты для получения Визы</div>
        
        <form id="entryForm">
            <div class="form-group">
                <label>Instagram</label>
                <input type="text" id="ig" placeholder="@username" required>
            </div>
            <div class="form-group">
                <label>Город</label>
                <input type="text" id="city" placeholder="Москва" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="signal@example.com" required>
            </div>
            <button type="submit" class="submit-btn">Начать Ритуал</button>
        </form>
    </div>
</div>

<div id="dbg"></div>

<script>
// === STAR FIELD ===
const starsContainer = document.getElementById('stars');
for(let i = 0; i < 60; i++){
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 2) + 's';
    starsContainer.appendChild(star);
}

// === TV STATIC CANVAS ===
const staticCanvas = document.getElementById('tv-static');
const staticCtx = staticCanvas.getContext('2d');

function resizeStatic(){
    staticCanvas.width = window.innerWidth;
    staticCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeStatic);
resizeStatic();

function drawStatic(){
    const idata = staticCtx.createImageData(staticCanvas.width, staticCanvas.height);
    const buffer = new Uint32Array(idata.data.buffer);
    for(let i = 0; i < buffer.length; i++){
        const v = Math.random() * 255;
        buffer[i] = (255 << 24) | (v << 16) | (v << 8) | v;
    }
    staticCtx.putImageData(idata, 0, 0);
    if(staticCanvas.classList.contains('active')){
        requestAnimationFrame(drawStatic);
    }
}

// === GAME STATE ===
let signalLocked = false;
let gameActive = false;

// Target: South (alpha ~180°), elevation ~60-80° (beta)
// Moon is at top-right, so we need to point there
const TARGET_ALPHA = 180; // South
const TARGET_BETA = 70;   // Elevation to moon
const ALPHA_TOLERANCE = 40; // ±40°
const BETA_TOLERANCE = 25;  // ±25°

let currentAlpha = 0;
let currentBeta = 0;
let signalStrength = 0;
let inHotZone = false;
let hotZoneTimer = null;

// Interference messages from "other universes"
const interferenceMessages = [
    "СИГНАЛ ИЗ ДРУГОЙ ВСЕЛЕННОЙ",
    "ЧАСТОТА ПРИШЕЛЬЦЕВ",
    "ПАРАЛЛЕЛЬНЫЙ МИР",
    "НЕЗНАКОМАЯ ГАЛАКТИКА",
    "ВРЕМЕННОЙ РАЗРЫВ",
    "КВАНТОВЫЙ ШУМ",
    "СИГНАЛ 1978",
    "ДРЕМЗ ДЕТЕКТЕД"
];

const startBtn = document.getElementById('startBtn');
const setup = document.getElementById('setup');
const gameUI = document.getElementById('gameUI');
const freqDisplay = document.getElementById('freqDisplay');
const statusText = document.getElementById('statusText');
const statusDot = document.getElementById('statusDot');
const statusPill = document.getElementById('statusPill');
const signalCore = document.getElementById('signalCore');
const portalVideo = document.getElementById('portalVideo');
const lockBtn = document.getElementById('lockBtn');
const moon = document.getElementById('moon');
const interference = document.getElementById('interference');
const interferenceText = document.getElementById('interferenceText');
const scannerReadout = document.getElementById('scannerReadout');
const readoutAlpha = document.getElementById('readoutAlpha');
const readoutBeta = document.getElementById('readoutBeta');
const readoutSignal = document.getElementById('readoutSignal');
const compassArrow = document.getElementById('compassArrow');
const compassLabel = document.getElementById('compassLabel');
const signalBars = document.querySelectorAll('.signal-bar');
const scanLine = document.getElementById('scanLine');
const glitchOverlay = document.getElementById('glitchOverlay');
const dbg = document.getElementById('dbg');

function updateSignalStrength(){
    // Calculate distance from target
    let alphaDiff = Math.abs(currentAlpha - TARGET_ALPHA);
    if(alphaDiff > 180) alphaDiff = 360 - alphaDiff; // Wrap around
    
    const betaDiff = Math.abs(currentBeta - TARGET_BETA);
    
    // Signal strength based on both angles
    const alphaProximity = Math.max(0, 1 - alphaDiff / ALPHA_TOLERANCE);
    const betaProximity = Math.max(0, 1 - betaDiff / BETA_TOLERANCE);
    
    // Combined signal (need both to be good)
    signalStrength = Math.min(alphaProximity, betaProximity) * 100;
    
    // Update UI
    updateUI(alphaDiff, betaDiff);
    
    // Random interference when not in hot zone
    if(signalStrength < 50 && Math.random() < 0.03){
        showInterference();
    }
}

function updateUI(alphaDiff, betaDiff){
    freqDisplay.innerText = Math.round(signalStrength) + '%';
    
    readoutAlpha.innerText = Math.round(currentAlpha);
    readoutBeta.innerText = Math.round(currentBeta);
    
    // Update compass arrow
    const arrowRotation = currentAlpha;
    compassArrow.style.transform = `translate(-50%,-100%) rotate(${arrowRotation}deg)`;
    
    // Signal bars
    const activeBars = Math.floor(signalStrength / 20);
    signalBars.forEach((bar, i) => {
        bar.className = 'signal-bar';
        if(i < activeBars){
            if(signalStrength > 80) bar.classList.add('hot');
            else bar.classList.add('active');
        }
    });
    
    // State machine
    if(signalStrength > 90){
        // LOCKING
        statusText.innerText = 'СИГНАЛ НАЙДЕН';
        statusDot.className = 'status-dot locking';
        statusPill.className = 'status-pill locking';
        freqDisplay.className = 'freq-value locking';
        readoutSignal.innerText = 'LOCKING';
        readoutSignal.className = 'readout-value locking';
        signalCore.className = 'signal-core ellipse locking';
        compassArrow.classList.add('hot');
        compassLabel.innerText = 'СИГНАЛ У ЛУНЫ';
        moon.classList.add('glow');
        portalVideo.classList.add('active');
        
        if(!inHotZone && !signalLocked){
            inHotZone = true;
            lockBtn.classList.add('visible');
            hotZoneTimer = setTimeout(() => {
                if(!signalLocked) lockSignal();
            }, 3000);
        }
    } else if(signalStrength > 50){
        // NEAR
        statusText.innerText = 'ПРИБЛИЖЕНИЕ...';
        statusDot.className = 'status-dot near';
        statusPill.className = 'status-pill';
        freqDisplay.className = 'freq-value near';
        readoutSignal.innerText = 'NEAR';
        readoutSignal.className = 'readout-value hot';
        signalCore.className = 'signal-core ellipse';
        compassArrow.classList.add('hot');
        compassLabel.innerText = 'ТЕПЛЕЕ...';
        moon.classList.remove('glow');
        portalVideo.classList.remove('active');
        
        inHotZone = false;
        lockBtn.classList.remove('visible');
        clearTimeout(hotZoneTimer);
    } else {
        // SCANNING
        statusText.innerText = 'ПОИСК ЧАСТОТЫ';
        statusDot.className = 'status-dot scanning';
        statusPill.className = 'status-pill';
        freqDisplay.className = 'freq-value';
        readoutSignal.innerText = 'SCANNING';
        readoutSignal.className = 'readout-value';
        signalCore.className = 'signal-core ellipse';
        compassArrow.classList.remove('hot');
        compassLabel.innerText = 'ПОВЕРНИ К ЮГУ';
        moon.classList.remove('glow');
        portalVideo.classList.remove('active');
        
        inHotZone = false;
        lockBtn.classList.remove('visible');
        clearTimeout(hotZoneTimer);
    }
}

function showInterference(){
    const msg = interferenceMessages[Math.floor(Math.random() * interferenceMessages.length)];
    interferenceText.innerText = msg;
    interference.classList.add('active');
    
    // Glitch effects
    glitchOverlay.style.background = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.1)`;
    glitchOverlay.classList.add('active');
    staticCanvas.classList.add('active');
    drawStatic();
    
    // Scan line
    scanLine.style.top = Math.random() * 100 + '%';
    scanLine.classList.add('active');
    
    setTimeout(() => {
        interference.classList.remove('active');
        glitchOverlay.classList.remove('active');
        staticCanvas.classList.remove('active');
        scanLine.classList.remove('active');
    }, 200 + Math.random() * 300);
}

function lockSignal(){
    if(signalLocked) return;
    signalLocked = true;
    clearTimeout(hotZoneTimer);
    
    statusText.innerText = 'СИГНАЛ ПОЙМАН';
    readoutSignal.innerText = 'LOCKED';
    freqDisplay.innerText = 'LOCK';
    
    signalCore.className = 'signal-core ellipse locked';
    portalVideo.classList.add('active');
    
    // Glitch the video slightly (from other universe)
    portalVideo.classList.add('glitching');
    setTimeout(() => portalVideo.classList.remove('glitching'), 500);
    
    if(navigator.vibrate) navigator.vibrate([100,50,100,50,200,100,300]);
    
    setTimeout(() => {
        document.getElementById('stage1').classList.add('hidden');
        document.getElementById('stage2').classList.add('active');
    }, 2000);
}

lockBtn.addEventListener('click', lockSignal);

// === GYROSCOPE ===
startBtn.addEventListener('click', () => {
    setup.style.display = 'none';
    gameUI.style.display = 'flex';
    gameActive = true;
    statusText.innerText = 'ПОИСК ЧАСТОТЫ';
    scannerReadout.style.opacity = '1';
    
    // Activate static noise
    staticCanvas.classList.add('active');
    drawStatic();
    
    if(typeof DeviceOrientationEvent !== 'undefined'){
        if(typeof DeviceOrientationEvent.requestPermission === 'function'){
            DeviceOrientationEvent.requestPermission().then(response => {
                if(response === 'granted'){
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }).catch(() => {});
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
    }
    
    // Fallback: simulate scanning
    simulateScanning();
});

function handleOrientation(e){
    if(e.alpha !== null) currentAlpha = e.alpha;
    if(e.beta !== null) currentBeta = Math.abs(e.beta);
    
    if(gameActive) updateSignalStrength();
}

// Fallback scanning simulation
function simulateScanning(){
    if(typeof DeviceOrientationEvent === 'undefined'){
        // No gyro - simulate with touch
        let simulatedAlpha = 0;
        let simulatedBeta = 30;
        
        window.addEventListener('touchmove', (e) => {
            const x = e.touches[0].clientX / window.innerWidth;
            const y = e.touches[0].clientY / window.innerHeight;
            
            simulatedAlpha = x * 360;
            simulatedBeta = 30 + y * 120;
            
            currentAlpha = simulatedAlpha;
            currentBeta = simulatedBeta;
            updateSignalStrength();
        }, {passive:true});
        
        // Auto-scan animation
        let scanDirection = 1;
        setInterval(() => {
            if(!gameActive || signalLocked) return;
            
            simulatedAlpha += 2 * scanDirection;
            if(simulatedAlpha > 360) simulatedAlpha = 0;
            
            simulatedBeta = 50 + Math.sin(Date.now() / 1000) * 40;
            
            currentAlpha = simulatedAlpha;
            currentBeta = simulatedBeta;
            updateSignalStrength();
        }, 50);
    }
}

// === FORM ===
document.getElementById('entryForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = {
        instagram: document.getElementById('ig').value,
        city: document.getElementById('city').value,
        email: document.getElementById('email').value
    };
    localStorage.setItem('kazantip_applicant', JSON.stringify(data));
    window.location.href = `interview.html?ig=${encodeURIComponent(data.instagram)}&city=${encodeURIComponent(data.city)}&email=${encodeURIComponent(data.email)}`;
});

// === TITLE FLICKER ===
setInterval(() => {
    if(Math.random() > 0.95){
        document.getElementById('mainTitle').style.opacity = 0.3;
        setTimeout(() => document.getElementById('mainTitle').style.opacity = 1, 50);
    }
}, 100);
</script>
</body>
</html>
