<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAZANTIP — SIGNAL HUNT</title>
<meta name="description" content="Найди свою частоту. Вступи в Республику.">
<meta property="og:title" content="KAZANTIP — SIGNAL HUNT">
<meta property="og:description" content="Найди свою частоту. Вступи в Республику.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
    --noise-light:rgba(255,255,255,0.8);
    --noise-dim:rgba(200,200,200,0.4);
    --signal-cyan:rgba(0,227,253,0.6);
    --signal-gold:rgba(255,215,0,0.5);
    --ui-dim:rgba(153,144,119,0.4);
    --ui-bright:rgba(255,246,223,0.9);
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
    height:100%;
    background:#0a0a0a;
    color:var(--ui-bright);
    font-family:'Space Grotesk',sans-serif;
    overflow:hidden;
    touch-action:none;
    -webkit-font-smoothing:antialiased;
}

/* === FULL SCREEN TV STATIC (ALWAYS ACTIVE) === */
#static-canvas{
    position:fixed;
    inset:0;
    z-index:1;
    width:100%;
    height:100%;
}

/* === SCANLINES === */
.scanlines{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    background:repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
    );
    opacity:0.6;
}

/* === CRT CURVATURE === */
.crt-curve{
    position:fixed;
    inset:0;
    z-index:3;
    pointer-events:none;
    background:radial-gradient(
        ellipse 100% 100% at 50% 50%,
        transparent 50%,
        rgba(0,0,0,0.4) 100%
    );
}

/* === VIGNETTE === */
.vignette{
    position:fixed;
    inset:0;
    z-index:4;
    pointer-events:none;
    background:radial-gradient(
        ellipse 90% 90% at 50% 50%,
        transparent 40%,
        rgba(0,0,0,0.7) 100%
    );
}

/* === SIGNAL PORTAL (SOFT, BLEEDING INTO NOISE) === */
.signal-portal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:260px;
    height:340px;
    z-index:5;
    border-radius:50%;
    overflow:hidden;
    transition:all 0.8s cubic-bezier(0.4,0,0.2,1);
}

/* Soft edge that bleeds into noise */
.signal-portal::before{
    content:'';
    position:absolute;
    inset:-40px;
    border-radius:50%;
    background:radial-gradient(
        ellipse 50% 50% at 50% 50%,
        rgba(0,227,253,0.15) 0%,
        rgba(0,227,253,0.05) 40%,
        transparent 70%
    );
    opacity:0;
    transition:opacity 0.8s;
    pointer-events:none;
}
.signal-portal.active::before{
    opacity:1;
}

/* Inner glow that spills */
.signal-portal::after{
    content:'';
    position:absolute;
    inset:-80px;
    border-radius:50%;
    background:radial-gradient(
        ellipse 50% 50% at 50% 50%,
        rgba(0,227,253,0.1) 0%,
        transparent 60%
    );
    opacity:0;
    transition:opacity 1.2s;
    pointer-events:none;
    filter:blur(20px);
}
.signal-portal.locking::after{
    opacity:1;
}

/* Video inside portal */
#portal-video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 0.6s;
    filter:contrast(1.3) saturate(1.2) brightness(0.9);
}
#portal-video.active{
    opacity:1;
}

/* Video glitch when locking */
#portal-video.glitching{
    animation:portalGlitch 0.12s infinite;
}
@keyframes portalGlitch{
    0%{transform:translate(0) scale(1);filter:contrast(1.3) saturate(1.2)}
    20%{transform:translate(-3px,1px) scale(1.02);filter:contrast(1.8) saturate(2) hue-rotate(30deg)}
    40%{transform:translate(2px,-2px) scale(0.98);filter:contrast(0.8) saturate(0.5) hue-rotate(-20deg)}
    60%{transform:translate(-1px,3px) scale(1.01);filter:contrast(1.5) saturate(1.8) hue-rotate(45deg)}
    80%{transform:translate(1px,-1px) scale(0.99);filter:contrast(1.1) saturate(0.8)}
    100%{transform:translate(0) scale(1);filter:contrast(1.3) saturate(1.2)}
}

/* Portal placeholder — faint shape in noise */
.portal-placeholder{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:opacity 0.5s;
}
.portal-placeholder.hidden{
    opacity:0;
}

.placeholder-glow{
    width:80px;
    height:80px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(0,227,253,0.3),transparent 70%);
    animation:placeholderPulse 2s infinite;
}
@keyframes placeholderPulse{
    0%,100%{transform:scale(1);opacity:0.3}
    50%{transform:scale(1.4);opacity:0.8}
}

/* === SIGNAL BURSTS (FLASHES IN NOISE) === */
.signal-burst{
    position:fixed;
    inset:0;
    z-index:6;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.05s;
    background:radial-gradient(
        ellipse 60% 70% at 50% 50%,
        rgba(255,255,255,0.9) 0%,
        rgba(0,227,253,0.3) 30%,
        transparent 60%
    );
    mix-blend-mode:screen;
}
.signal-burst.active{
    opacity:1;
}

/* === ANALOG METERS (LEFT SIDE) === */
.meter-panel-left{
    position:fixed;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    z-index:20;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.meter{
    width:48px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.meter-label{
    font-family:'Share Tech Mono',monospace;
    font-size:0.55rem;
    color:var(--ui-dim);
    letter-spacing:0.1em;
    text-transform:uppercase;
}

.meter-scale{
    width:40px;
    height:120px;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(153,144,119,0.2);
    border-radius:4px;
    position:relative;
    overflow:hidden;
}

.meter-bar{
    position:absolute;
    bottom:0;
    left:2px;
    right:2px;
    background:linear-gradient(to top,
        rgba(0,227,253,0.6),
        rgba(255,215,0,0.5),
        rgba(255,100,50,0.7)
    );
    border-radius:2px;
    transition:height 0.15s;
    min-height:2px;
}

.meter-peak{
    position:absolute;
    left:0;
    right:0;
    height:1px;
    background:rgba(255,100,50,0.8);
    transition:bottom 0.3s;
}

/* === ANALOG DIAL (RIGHT SIDE) === */
.dial-panel-right{
    position:fixed;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    z-index:20;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}

.dial-large{
    width:80px;
    height:80px;
    position:relative;
}

.dial-face{
    width:100%;
    height:100%;
    border-radius:50%;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(153,144,119,0.2);
    position:relative;
}

.dial-needle{
    position:absolute;
    top:50%;
    left:50%;
    width:2px;
    height:34px;
    background:linear-gradient(to top,var(--signal-gold),rgba(255,215,0,0.3));
    transform-origin:bottom center;
    transform:translate(-50%,-100%) rotate(-135deg);
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
    border-radius:1px;
}

.dial-center{
    position:absolute;
    top:50%;
    left:50%;
    width:6px;
    height:6px;
    background:var(--ui-dim);
    border-radius:50%;
    transform:translate(-50%,-50%);
}

.dial-ticks{
    position:absolute;
    inset:4px;
}

.dial-tick{
    position:absolute;
    top:0;
    left:50%;
    width:1px;
    height:4px;
    background:rgba(153,144,119,0.3);
    transform-origin:center 34px;
}

.dial-value{
    font-family:'Share Tech Mono',monospace;
    font-size:0.65rem;
    color:var(--ui-dim);
    letter-spacing:0.05em;
}
.dial-value.hot{color:var(--signal-gold)}

/* === OSCILLOSCOPE (BOTTOM) === */
.oscilloscope{
    position:fixed;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    width:240px;
    height:70px;
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(153,144,119,0.15);
    border-radius:6px;
    overflow:hidden;
}

.oscilloscope-label{
    position:absolute;
    top:2px;
    right:6px;
    font-family:'Share Tech Mono',monospace;
    font-size:0.5rem;
    color:rgba(153,144,119,0.4);
    letter-spacing:0.1em;
}

#oscilloscope-canvas{
    width:100%;
    height:100%;
}

/* === COMPASS (TOP CENTER) === */
.compass-top{
    position:fixed;
    top:24px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    display:flex;
    align-items:center;
    gap:16px;
}

.compass-mini{
    width:48px;
    height:48px;
    position:relative;
}

.compass-mini-ring{
    position:absolute;
    inset:0;
    border:1px solid rgba(153,144,119,0.2);
    border-radius:50%;
}

.compass-mini-arrow{
    position:absolute;
    top:50%;
    left:50%;
    width:2px;
    height:18px;
    background:var(--ui-dim);
    transform-origin:bottom center;
    transform:translate(-50%,-100%) rotate(0deg);
    transition:all .3s;
}
.compass-mini-arrow.hot{
    background:var(--signal-gold);
    box-shadow:0 0 6px rgba(255,215,0,0.5);
}

.compass-mini-arrow::after{
    content:'';
    position:absolute;
    top:-4px;
    left:50%;
    transform:translateX(-50%);
    border-left:3px solid transparent;
    border-right:3px solid transparent;
    border-bottom:5px solid var(--ui-dim);
}
.compass-mini-arrow.hot::after{
    border-bottom-color:var(--signal-gold);
}

.compass-readout{
    font-family:'Share Tech Mono',monospace;
    font-size:0.75rem;
    color:var(--ui-dim);
    letter-spacing:0.05em;
}
.compass-readout.hot{
    color:var(--signal-gold);
    text-shadow:0 0 8px rgba(255,215,0,0.3);
}

/* === STATUS (TOP LEFT) === */
.status-display{
    position:fixed;
    top:24px;
    left:16px;
    z-index:20;
    font-family:'Share Tech Mono',monospace;
    font-size:0.65rem;
    color:var(--ui-dim);
    letter-spacing:0.1em;
    line-height:1.6;
}

.status-line{
    display:flex;
    gap:8px;
}

.status-label{
    color:rgba(153,144,119,0.4);
    min-width:60px;
}

.status-value{
    color:var(--ui-bright);
}
.status-value.hot{color:var(--signal-gold)}
.status-value.locking{color:var(--signal-cyan)}

.status-blink{
    animation:statusBlink 1s infinite;
}
@keyframes statusBlink{0%,100%{opacity:1}50%{opacity:0.3}}

/* === START SCREEN === */
#start-screen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:30;
    transition:opacity 1s;
}
#start-screen.hidden{
    opacity:0;
    pointer-events:none;
}

.start-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(2rem,6vw,3.5rem);
    font-weight:700;
    letter-spacing:-0.02em;
    color:var(--ui-bright);
    text-shadow:0 0 40px rgba(255,255,255,0.1);
    margin-bottom:8px;
}

.start-subtitle{
    font-family:'Share Tech Mono',monospace;
    font-size:0.75rem;
    color:var(--ui-dim);
    letter-spacing:0.15em;
    margin-bottom:40px;
}

.start-btn{
    padding:16px 48px;
    background:transparent;
    color:var(--ui-bright);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:8px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.875rem;
    font-weight:500;
    letter-spacing:0.12em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .3s;
}
.start-btn:hover{
    border-color:rgba(255,255,255,0.4);
    background:rgba(255,255,255,0.05);
}

.start-hint{
    margin-top:24px;
    font-family:'Share Tech Mono',monospace;
    font-size:0.65rem;
    color:rgba(153,144,119,0.5);
    letter-spacing:0.1em;
    text-align:center;
    line-height:1.8;
}

/* === LOCK BUTTON === */
.lock-btn{
    position:fixed;
    bottom:32px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    padding:14px 40px;
    background:rgba(255,215,0,0.15);
    color:var(--signal-gold);
    border:1px solid rgba(255,215,0,0.4);
    border-radius:8px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.8rem;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:all .4s;
    backdrop-filter:blur(10px);
    z-index:20;
}
.lock-btn.visible{
    opacity:1;
    pointer-events:auto;
    transform:translateX(-50%) translateY(0);
}
.lock-btn:hover{
    background:rgba(255,215,0,0.25);
    box-shadow:0 0 30px rgba(255,215,0,0.3);
}

/* === INTERFERENCE TEXT (KAZANTIP THEMED) === */
.interference-overlay{
    position:fixed;
    inset:0;
    z-index:10;
    pointer-events:none;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity 0.1s;
}
.interference-overlay.active{
    opacity:1;
}

.interference-text{
    font-family:'Share Tech Mono',monospace;
    font-size:0.8rem;
    color:rgba(255,215,0,0.7);
    letter-spacing:0.2em;
    text-transform:uppercase;
    text-shadow:0 0 20px rgba(255,215,0,0.4);
    animation:textGlitch 0.08s infinite;
    text-align:center;
    padding:12px 24px;
    background:rgba(0,0,0,0.8);
    border:1px solid rgba(255,215,0,0.2);
}
@keyframes textGlitch{
    0%,100%{opacity:1;transform:translate(0)}
    25%{opacity:0.7;transform:translate(-1px,1px)}
    50%{opacity:0.9;transform:translate(1px,-1px)}
    75%{opacity:0.6;transform:translate(-1px,-1px)}
}

/* === STAGE 2: FORM === */
#stage2{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 1s;
    z-index:50;
    padding:20px;
    background:rgba(0,0,0,0.9);
}
#stage2.active{
    opacity:1;
    pointer-events:auto;
}

.form-container{
    width:100%;
    max-width:420px;
    padding:48px;
    border-radius:12px;
    background:rgba(20,20,20,0.9);
    border:1px solid rgba(255,255,255,0.1);
}

.form-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.75rem;
    font-weight:600;
    color:var(--ui-bright);
    margin-bottom:8px;
    text-align:center;
}

.form-subtitle{
    font-family:'Share Tech Mono',monospace;
    font-size:0.8rem;
    color:var(--ui-dim);
    margin-bottom:40px;
    text-align:center;
    letter-spacing:0.05em;
}

.form-group{
    margin-bottom:24px;
}

.form-group label{
    display:block;
    font-family:'Share Tech Mono',monospace;
    font-size:0.65rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ui-dim);
    margin-bottom:10px;
}

.form-group input{
    width:100%;
    padding:14px 16px;
    background:rgba(0,0,0,0.6);
    border:1px solid rgba(153,144,119,0.2);
    border-radius:8px;
    color:var(--ui-bright);
    font-family:'Space Grotesk',sans-serif;
    font-size:0.9375rem;
    outline:none;
    transition:all .3s;
}

.form-group input:focus{
    border-color:var(--signal-cyan);
    box-shadow:0 0 0 2px rgba(0,227,253,0.1);
}

.form-group input::placeholder{
    color:rgba(153,144,119,0.3);
}

.submit-btn{
    width:100%;
    padding:16px;
    background:rgba(255,215,0,0.2);
    color:var(--signal-gold);
    border:1px solid rgba(255,215,0,0.4);
    border-radius:8px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.875rem;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .3s;
    margin-top:16px;
}

.submit-btn:hover{
    background:rgba(255,215,0,0.3);
    box-shadow:0 0 30px rgba(255,215,0,0.2);
}

/* === HORIZONTAL SCAN BAR === */
.scan-bar{
    position:fixed;
    left:0;
    right:0;
    height:2px;
    background:linear-gradient(90deg,transparent,rgba(0,227,253,0.4),transparent);
    z-index:7;
    pointer-events:none;
    opacity:0;
    transition:opacity .2s;
}
.scan-bar.active{
    opacity:1;
    animation:scanMove 0.5s linear;
}
@keyframes scanMove{
    0%{top:0%}
    100%{top:100%}
}

/* === DEBUG === */
#dbg{
    position:fixed;
    bottom:8px;
    right:8px;
    font-size:9px;
    color:rgba(153,144,119,0.2);
    z-index:100;
    font-family:'Share Tech Mono',monospace;
}
</style>
</head>
<body>

<!-- TV Static (always active background) -->
<canvas id="static-canvas"></canvas>

<!-- CRT effects -->
<div class="scanlines"></div>
<div class="crt-curve"></div>
<div class="vignette"></div>

<!-- Signal burst flash -->
<div class="signal-burst" id="signalBurst"></div>

<!-- Horizontal scan bar -->
<div class="scan-bar" id="scanBar"></div>

<!-- Interference text -->
<div class="interference-overlay" id="interferenceOverlay">
    <div class="interference-text" id="interferenceText">АРБУЗ ДЕТЕКТЕД</div>
</div>

<!-- Signal Portal (center) -->
<div class="signal-portal" id="signalPortal">
    <video id="portal-video" loop muted playsinline>
        <source src="signal-portal.mp4" type="video/mp4">
    </video>
    <div class="portal-placeholder" id="portalPlaceholder">
        <div class="placeholder-glow"></div>
    </div>
</div>

<!-- Analog Meters (left) -->
<div class="meter-panel-left">
    <div class="meter">
        <div class="meter-label">SIG</div>
        <div class="meter-scale">
            <div class="meter-bar" id="meter-signal" style="height:5%"></div>
            <div class="meter-peak" id="meter-peak" style="bottom:5%"></div>
        </div>
    </div>
    <div class="meter">
        <div class="meter-label">NOISE</div>
        <div class="meter-scale">
            <div class="meter-bar" id="meter-noise" style="height:80%;background:rgba(153,144,119,0.3)"></div>
        </div>
    </div>
</div>

<!-- Analog Dial (right) -->
<div class="dial-panel-right">
    <div class="meter-label">FREQ</div>
    <div class="dial-large">
        <div class="dial-face">
            <div class="dial-ticks" id="dialTicks"></div>
            <div class="dial-needle" id="dialNeedle"></div>
            <div class="dial-center"></div>
        </div>
    </div>
    <div class="dial-value" id="dialValue">87.5 MHz</div>
</div>

<!-- Oscilloscope (bottom) -->
<div class="oscilloscope" id="oscilloscope">
    <div class="oscilloscope-label">WAVEFORM</div>
    <canvas id="oscilloscope-canvas"></canvas>
</div>

<!-- Compass (top center) -->
<div class="compass-top" id="compassTop" style="opacity:0;transition:opacity 0.5s">
    <div class="compass-mini">
        <div class="compass-mini-ring"></div>
        <div class="compass-mini-arrow" id="compassArrow"></div>
    </div>
    <div class="compass-readout" id="compassReadout">000°</div>
</div>

<!-- Status (top left) -->
<div class="status-display" id="statusDisplay" style="opacity:0;transition:opacity 0.5s">
    <div class="status-line">
        <span class="status-label">STATUS</span>
        <span class="status-value status-blink" id="statusValue">SCANNING</span>
    </div>
    <div class="status-line">
        <span class="status-label">AZIMUTH</span>
        <span class="status-value" id="statusAlpha">---</span>
    </div>
    <div class="status-line">
        <span class="status-label">ELEV</span>
        <span class="status-value" id="statusBeta">---</span>
    </div>
    <div class="status-line">
        <span class="status-label">SIGNAL</span>
        <span class="status-value" id="statusSignal">0%</span>
    </div>
</div>

<!-- Lock Button -->
<button class="lock-btn" id="lockBtn">Фиксировать</button>

<!-- Start Screen -->
<div id="start-screen">
    <div class="start-title">SIGNAL HUNT</div>
    <div class="start-subtitle">KAZANTIP REPUBLIC // FREQUENCY SCANNER</div>
    <button class="start-btn" id="startBtn">Инициализировать Сканер</button>
    <div class="start-hint">
        НАПРАВЬ ТЕЛЕФОН НА ЮГ<br>
        ПОДНИМИ К НЕБУ — К ЛУНЕ<br>
        ИЩИ КРИСТАЛЛ В ШУМЕ
    </div>
</div>

<!-- Stage 2: Form -->
<div id="stage2">
    <div class="form-container">
        <div class="form-title">Вступить в Республику</div>
        <div class="form-subtitle">Оставь координаты для получения Визы</div>
        <form id="entryForm">
            <div class="form-group">
                <label>Instagram</label>
                <input type="text" id="ig" placeholder="@username" required>
            </div>
            <div class="form-group">
                <label>Город</label>
                <input type="text" id="city" placeholder="Москва" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="signal@example.com" required>
            </div>
            <button type="submit" class="submit-btn">Начать Ритуал</button>
        </form>
    </div>
</div>

<div id="dbg"></div>

<script>
// === TV STATIC (ALWAYS RUNNING) ===
const staticCanvas = document.getElementById('static-canvas');
const staticCtx = staticCanvas.getContext('2d');

function resizeStatic(){
    staticCanvas.width = window.innerWidth;
    staticCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeStatic);
resizeStatic();

let staticIntensity = 1.0; // 1.0 = full noise, 0.0 = clear signal

function drawStatic(){
    const w = staticCanvas.width;
    const h = staticCanvas.height;
    const idata = staticCtx.createImageData(w, h);
    const buffer = new Uint32Array(idata.data.buffer);
    
    // Create noise with varying intensity
    for(let i = 0; i < buffer.length; i++){
        const noise = Math.random();
        // More intense noise in center area (portal zone) when signal is weak
        const x = (i % w) / w;
        const y = Math.floor(i / w) / h;
        const distFromCenter = Math.sqrt((x-0.5)**2 + (y-0.5)**2);
        
        // Portal area has less noise when signal is strong
        let portalFactor = 1;
        if(distFromCenter < 0.25){
            portalFactor = staticIntensity;
        }
        
        const v = Math.floor(noise * 255 * portalFactor);
        buffer[i] = (255 << 24) | (v << 16) | (v << 8) | v;
    }
    
    staticCtx.putImageData(idata, 0, 0);
    requestAnimationFrame(drawStatic);
}
drawStatic();

// === DIAL TICKS ===
const dialTicks = document.getElementById('dialTicks');
for(let i = 0; i < 12; i++){
    const tick = document.createElement('div');
    tick.className = 'dial-tick';
    tick.style.transform = `translateX(-50%) rotate(${i * 30}deg)`;
    dialTicks.appendChild(tick);
}

// === OSCILLOSCOPE ===
const oscCanvas = document.getElementById('oscilloscope-canvas');
const oscCtx = oscCanvas.getContext('2d');

function resizeOsc(){
    const rect = oscCanvas.parentElement.getBoundingClientRect();
    oscCanvas.width = rect.width;
    oscCanvas.height = rect.height;
}
resizeOsc();

let signalStrength = 0;
let targetSignalStrength = 0;

function drawOscilloscope(){
    const w = oscCanvas.width;
    const h = oscCanvas.height;
    
    oscCtx.fillStyle = 'rgba(0,0,0,0.15)';
    oscCtx.fillRect(0, 0, w, h);
    
    const time = Date.now() / 1000;
    const amplitude = signalStrength / 100;
    const noise = (1 - amplitude);
    
    // Draw grid
    oscCtx.strokeStyle = 'rgba(153,144,119,0.08)';
    oscCtx.lineWidth = 0.5;
    for(let x = 0; x < w; x += 20){
        oscCtx.beginPath();
        oscCtx.moveTo(x, 0);
        oscCtx.lineTo(x, h);
        oscCtx.stroke();
    }
    for(let y = 0; y < h; y += 15){
        oscCtx.beginPath();
        oscCtx.moveTo(0, y);
        oscCtx.lineTo(w, y);
        oscCtx.stroke();
    }
    
    // Draw signal wave
    oscCtx.strokeStyle = signalStrength > 80 ? 'rgba(0,227,253,0.7)' : 
                         signalStrength > 50 ? 'rgba(255,215,0,0.6)' : 'rgba(153,144,119,0.3)';
    oscCtx.lineWidth = 1.5;
    oscCtx.beginPath();
    
    for(let x = 0; x < w; x++){
        const normalizedX = x / w;
        
        // Signal wave
        const wave1 = Math.sin(normalizedX * 15 + time * 8) * amplitude * h * 0.35;
        const wave2 = Math.sin(normalizedX * 8 + time * 3) * amplitude * h * 0.15;
        
        // Noise
        const staticNoise = (Math.random() - 0.5) * noise * h * 0.5;
        
        // Occasional signal burst (clear wave)
        const burst = signalStrength > 70 && Math.sin(time * 10) > 0.8 ? 
                      Math.sin(normalizedX * 20 + time * 15) * h * 0.2 : 0;
        
        const y = h / 2 + wave1 + wave2 + staticNoise + burst;
        
        if(x === 0) oscCtx.moveTo(x, y);
        else oscCtx.lineTo(x, y);
    }
    
    oscCtx.stroke();
    requestAnimationFrame(drawOscilloscope);
}
drawOscilloscope();

// === GAME STATE ===
let signalLocked = false;
let gameActive = false;

const TARGET_ALPHA = 180;
const TARGET_BETA = 70;
const ALPHA_TOLERANCE = 40;
const BETA_TOLERANCE = 25;

let currentAlpha = 0;
let currentBeta = 0;
let inHotZone = false;
let hotZoneTimer = null;

const interferenceMessages = [
    "АРБУЗ ДЕТЕКТЕД",
    "ГОРБУШКА 1999",
    "РЕСПУБЛИКА ОНЛАЙН",
    "КРИСТАЛЛ ВОССТАНОВЛЕН",
    "DREEMZ TRANSMISSION",
    "ВИЗА ОДОБРЕНА",
    "СИГНАЛ ИЗ ПОПОВКИ",
    "КИСЛОВОДСК КОННЕКТ",
    "КВАНТОВЫЙ АРБУЗ"
];

// Elements
const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('startBtn');
const signalPortal = document.getElementById('signalPortal');
const portalVideo = document.getElementById('portal-video');
const portalPlaceholder = document.getElementById('portalPlaceholder');
const lockBtn = document.getElementById('lockBtn');
const statusDisplay = document.getElementById('statusDisplay');
const statusValue = document.getElementById('statusValue');
const statusAlpha = document.getElementById('statusAlpha');
const statusBeta = document.getElementById('statusBeta');
const statusSignal = document.getElementById('statusSignal');
const meterSignal = document.getElementById('meter-signal');
const meterPeak = document.getElementById('meter-peak');
const dialNeedle = document.getElementById('dialNeedle');
const dialValue = document.getElementById('dialValue');
const compassArrow = document.getElementById('compassArrow');
const compassReadout = document.getElementById('compassReadout');
const compassTop = document.getElementById('compassTop');
const signalBurst = document.getElementById('signalBurst');
const interferenceOverlay = document.getElementById('interferenceOverlay');
const interferenceText = document.getElementById('interferenceText');
const scanBar = document.getElementById('scanBar');
const oscilloscope = document.getElementById('oscilloscope');
const dbg = document.getElementById('dbg');

function updateSignalStrength(){
    let alphaDiff = Math.abs(currentAlpha - TARGET_ALPHA);
    if(alphaDiff > 180) alphaDiff = 360 - alphaDiff;
    
    const betaDiff = Math.abs(currentBeta - TARGET_BETA);
    
    const alphaProximity = Math.max(0, 1 - alphaDiff / ALPHA_TOLERANCE);
    const betaProximity = Math.max(0, 1 - betaDiff / BETA_TOLERANCE);
    
    targetSignalStrength = Math.min(alphaProximity, betaProximity) * 100;
    
    // Smooth transition
    signalStrength += (targetSignalStrength - signalStrength) * 0.1;
    
    // Update static intensity (less noise when signal is strong)
    staticIntensity = 1 - (signalStrength / 100) * 0.7;
    
    updateUI();
    
    // Random signal bursts
    if(signalStrength > 30 && signalStrength < 80 && Math.random() < 0.02){
        showSignalBurst();
    }
    
    // Interference when not in hot zone
    if(signalStrength < 40 && Math.random() < 0.025){
        showInterference();
    }
}

function updateUI(){
    // Status
    statusAlpha.innerText = Math.round(currentAlpha) + '°';
    statusBeta.innerText = Math.round(currentBeta) + '°';
    statusSignal.innerText = Math.round(signalStrength) + '%';
    
    // Compass
    compassArrow.style.transform = `translate(-50%,-100%) rotate(${currentAlpha}deg)`;
    compassReadout.innerText = Math.round(currentAlpha).toString().padStart(3, '0') + '°';
    
    // Dial
    const dialRotation = (signalStrength / 100) * 270 - 135;
    dialNeedle.style.transform = `translate(-50%,-100%) rotate(${dialRotation}deg)`;
    dialValue.innerText = (87.5 + signalStrength * 0.15).toFixed(1) + ' MHz';
    
    // Signal meter
    meterSignal.style.height = signalStrength + '%';
    if(signalStrength > parseFloat(meterPeak.style.bottom)){
        meterPeak.style.bottom = signalStrength + '%';
    }
    // Decay peak
    setTimeout(() => {
        meterPeak.style.bottom = Math.max(5, signalStrength) + '%';
    }, 300);
    
    // Portal state
    if(signalStrength > 90){
        statusValue.innerText = 'LOCKING';
        statusValue.className = 'status-value locking';
        signalPortal.className = 'signal-portal active locking';
        portalVideo.classList.add('active');
        portalPlaceholder.classList.add('hidden');
        dialValue.classList.add('hot');
        compassArrow.classList.add('hot');
        compassReadout.classList.add('hot');
        
        // Show video glitch
        if(Math.random() < 0.05){
            portalVideo.classList.add('glitching');
            setTimeout(() => portalVideo.classList.remove('glitching'), 150);
        }
        
        if(!inHotZone && !signalLocked){
            inHotZone = true;
            lockBtn.classList.add('visible');
            hotZoneTimer = setTimeout(() => {
                if(!signalLocked) lockSignal();
            }, 3000);
        }
    } else if(signalStrength > 50){
        statusValue.innerText = 'NEAR';
        statusValue.className = 'status-value hot';
        signalPortal.className = 'signal-portal active';
        portalVideo.classList.remove('active');
        portalPlaceholder.classList.remove('hidden');
        dialValue.classList.remove('hot');
        compassArrow.classList.remove('hot');
        compassReadout.classList.remove('hot');
        
        // Show brief video flashes
        if(Math.random() < 0.03){
            portalVideo.classList.add('active');
            setTimeout(() => portalVideo.classList.remove('active'), 100);
        }
        
        inHotZone = false;
        lockBtn.classList.remove('visible');
        clearTimeout(hotZoneTimer);
    } else {
        statusValue.innerText = 'SCANNING';
        statusValue.className = 'status-value status-blink';
        signalPortal.className = 'signal-portal';
        portalVideo.classList.remove('active');
        portalPlaceholder.classList.remove('hidden');
        dialValue.classList.remove('hot');
        compassArrow.classList.remove('hot');
        compassReadout.classList.remove('hot');
        
        inHotZone = false;
        lockBtn.classList.remove('visible');
        clearTimeout(hotZoneTimer);
    }
}

function showSignalBurst(){
    signalBurst.classList.add('active');
    
    // Brief clear signal in center
    staticIntensity = 0.2;
    
    setTimeout(() => {
        signalBurst.classList.remove('active');
        staticIntensity = 1 - (signalStrength / 100) * 0.7;
    }, 80 + Math.random() * 120);
}

function showInterference(){
    const msg = interferenceMessages[Math.floor(Math.random() * interferenceMessages.length)];
    interferenceText.innerText = msg;
    interferenceOverlay.classList.add('active');
    
    scanBar.classList.add('active');
    
    setTimeout(() => {
        interferenceOverlay.classList.remove('active');
        scanBar.classList.remove('active');
    }, 150 + Math.random() * 200);
}

function lockSignal(){
    if(signalLocked) return;
    signalLocked = true;
    clearTimeout(hotZoneTimer);
    
    statusValue.innerText = 'LOCKED';
    signalPortal.className = 'signal-portal active locking';
    portalVideo.classList.add('active');
    portalPlaceholder.classList.add('hidden');
    staticIntensity = 0.1;
    
    // Strong glitch
    portalVideo.classList.add('glitching');
    setTimeout(() => portalVideo.classList.remove('glitching'), 800);
    
    if(navigator.vibrate) navigator.vibrate([100,50,100,50,200,100,300]);
    
    setTimeout(() => {
        startScreen.classList.add('hidden');
        document.getElementById('stage2').classList.add('active');
    }, 2000);
}

lockBtn.addEventListener('click', lockSignal);

// === START ===
startBtn.addEventListener('click', () => {
    startScreen.classList.add('hidden');
    gameActive = true;
    statusDisplay.style.opacity = '1';
    compassTop.style.opacity = '1';
    oscilloscope.style.opacity = '1';
    
    if(typeof DeviceOrientationEvent !== 'undefined'){
        if(typeof DeviceOrientationEvent.requestPermission === 'function'){
            DeviceOrientationEvent.requestPermission().then(response => {
                if(response === 'granted'){
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }).catch(() => {});
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
    }
    
    simulateScanning();
});

function handleOrientation(e){
    if(e.alpha !== null) currentAlpha = e.alpha;
    // Phone UP = high beta (pointing to sky/moon)
    if(e.beta !== null) currentBeta = Math.max(0, 180 - Math.abs(e.beta));
    if(e.gamma !== null) currentBeta = Math.max(currentBeta, Math.abs(e.gamma));
    
    if(gameActive) updateSignalStrength();
    
    dbg.innerHTML = `α:${Math.round(currentAlpha)}° β:${Math.round(currentBeta)}°<br>sig:${Math.round(signalStrength)}%`;
}

function simulateScanning(){
    if(typeof DeviceOrientationEvent === 'undefined'){
        let simulatedAlpha = 0;
        let simulatedBeta = 30;
        
        window.addEventListener('touchmove', (e) => {
            const x = e.touches[0].clientX / window.innerWidth;
            const y = e.touches[0].clientY / window.innerHeight;
            
            simulatedAlpha = x * 360;
            simulatedBeta = 30 + (1 - y) * 120;
            
            currentAlpha = simulatedAlpha;
            currentBeta = simulatedBeta;
            updateSignalStrength();
        }, {passive:true});
        
        let scanDirection = 1;
        setInterval(() => {
            if(!gameActive || signalLocked) return;
            
            simulatedAlpha += 2 * scanDirection;
            if(simulatedAlpha > 360) simulatedAlpha = 0;
            
            simulatedBeta = 50 + Math.sin(Date.now() / 1000) * 40;
            
            currentAlpha = simulatedAlpha;
            currentBeta = simulatedBeta;
            updateSignalStrength();
        }, 50);
    }
}

// === FORM ===
document.getElementById('entryForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = {
        instagram: document.getElementById('ig').value,
        city: document.getElementById('city').value,
        email: document.getElementById('email').value
    };
    localStorage.setItem('kazantip_applicant', JSON.stringify(data));
    window.location.href = `interview.html?ig=${encodeURIComponent(data.instagram)}&city=${encodeURIComponent(data.city)}&email=${encodeURIComponent(data.email)}`;
});

// === TITLE FLICKER ===
setInterval(() => {
    if(Math.random() > 0.95){
        document.querySelector('.start-title').style.opacity = 0.3;
        setTimeout(() => document.querySelector('.start-title').style.opacity = 1, 50);
    }
}, 100);
</script>
</body>
</html>
