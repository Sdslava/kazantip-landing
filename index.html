<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAZANTIP — ПОИСК СИГНАЛА</title>
<meta name="description" content="Найди свою частоту. Вступи в Республику.">
<meta property="og:title" content="KAZANTIP — ПОИСК СИГНАЛА">
<meta property="og:description" content="Найди свою частоту. Вступи в Республику.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --surface:#121318;
    --surface-dim:#121318;
    --on-surface:#e3e1e9;
    --on-surface-variant:#d0c6ab;
    --primary:#fff6df;
    --primary-container:#ffd700;
    --on-primary-container:#705e00;
    --secondary:#bdf4ff;
    --secondary-container:#00e3fd;
    --on-secondary-container:#00616d;
    --outline:#999077;
    --outline-variant:#4d4732;
    --error:#ffb4ab;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
    height:100%;
    background:var(--surface);
    color:var(--on-surface);
    font-family:'Inter',sans-serif;
    overflow:hidden;
    touch-action:none;
    -webkit-font-smoothing:antialiased;
}

/* === CELESTIAL BACKGROUND === */
.celestial-bg{
    position:fixed;
    inset:0;
    background:
        radial-gradient(ellipse 80% 50% at 50% 50%, rgba(26,27,33,0.8) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 70% 30%, rgba(255,246,223,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 30% 70%, rgba(0,227,253,0.02) 0%, transparent 50%),
        var(--surface);
    z-index:0;
}

/* === STARS === */
.stars{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:var(--primary);
    border-radius:50%;
    opacity:0;
    animation:twinkle 3s infinite ease-in-out;
}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:0.8}}

/* === MOON === */
.moon{
    position:fixed;
    top:12%;
    right:25%;
    width:80px;
    height:80px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, rgba(255,246,223,0.9), rgba(255,246,223,0.3));
    box-shadow:0 0 60px rgba(255,246,223,0.2),0 0 120px rgba(255,246,223,0.1);
    z-index:1;
    transition:all 1s ease;
}
.moon.glow{
    transform:scale(1.15);
    box-shadow:0 0 80px rgba(255,246,223,0.5),0 0 160px rgba(255,246,223,0.3),0 0 300px rgba(255,246,223,0.1);
}

/* === MOON TARGET INDICATOR === */
.moon-target{
    position:fixed;
    top:12%;
    right:25%;
    width:120px;
    height:120px;
    margin:-20px;
    border:1px dashed rgba(255,246,223,0.15);
    border-radius:50%;
    z-index:1;
    pointer-events:none;
    opacity:0;
    transition:opacity .5s;
}
.moon-target.active{
    opacity:1;
    animation:targetPulse 2s infinite;
}
@keyframes targetPulse{0%,100%{border-color:rgba(255,246,223,0.15)}50%{border-color:rgba(255,215,0,0.4)}}

/* === SCANLINES === */
.scanlines{
    position:fixed;
    inset:0;
    z-index:3;
    pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
    opacity:0.4;
}

/* === CRT FLICKER === */
.crt-flicker{
    position:fixed;
    inset:0;
    z-index:3;
    pointer-events:none;
    background:rgba(255,255,255,0.02);
    opacity:0;
    animation:crtFlicker 0.15s infinite;
}
@keyframes crtFlicker{0%,100%{opacity:0}50%{opacity:1}}

/* === TV STATIC CANVAS === */
#tv-static{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    opacity:0;
    transition:opacity .3s;
}
#tv-static.active{opacity:0.12}

/* === MAIN UI === */
#stage1{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    transition:opacity 1.2s cubic-bezier(0.4,0,0.2,1);
}
#stage1.hidden{opacity:0;pointer-events:none}

/* === STATUS PILL === */
.status-bar{
    position:fixed;
    top:32px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    text-align:center;
}

.status-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 20px;
    border-radius:9999px;
    background:rgba(255,246,223,0.05);
    border:1px solid rgba(255,246,223,0.1);
    transition:all .5s;
}
.status-pill.locking{
    background:rgba(0,227,253,0.1);
    border-color:rgba(0,227,253,0.3);
    box-shadow:0 0 20px rgba(0,227,253,0.2);
}

.status-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--outline);
    animation:statusPulse 2s infinite;
}
.status-dot.scanning{background:var(--primary-container);box-shadow:0 0 8px var(--primary-container)}
.status-dot.near{background:#ff8c00;box-shadow:0 0 12px #ff8c00}
.status-dot.locking{
    background:var(--secondary-container);
    box-shadow:0 0 16px var(--secondary-container);
    animation:lockPulse 0.5s infinite;
}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes lockPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

.display-xl{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(2.5rem,8vw,4.5rem);
    font-weight:700;
    line-height:1.1;
    letter-spacing:-0.04em;
    color:var(--primary);
    text-shadow:0 0 40px rgba(255,246,223,0.15);
    margin-bottom:10px;
}

.label{
    font-family:'Space Grotesk',sans-serif;
    font-size:0.7rem;
    font-weight:500;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--on-surface-variant);
}

/* === START SCREEN === */
.start-screen{
    text-align:center;
    padding:20px;
}

.start-hint{
    margin-top:20px;
    font-size:0.75rem;
    color:var(--outline);
    letter-spacing:0.1em;
    line-height:1.8;
    max-width:280px;
    margin-left:auto;
    margin-right:auto;
}

.start-btn{
    margin-top:40px;
    padding:18px 56px;
    background:transparent;
    color:var(--primary);
    border:1px solid rgba(255,246,223,0.3);
    border-radius:12px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.875rem;
    font-weight:500;
    letter-spacing:0.12em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .3s ease;
    position:relative;
    overflow:hidden;
}
.start-btn:hover{
    border-color:rgba(255,246,223,0.6);
    box-shadow:0 0 30px rgba(255,246,223,0.1);
}

/* === COMPASS (IMPROVED) === */
.compass-container{
    position:fixed;
    bottom:200px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    text-align:center;
    transition:all .5s;
}

.compass{
    width:120px;
    height:120px;
    position:relative;
    margin:0 auto 12px;
}

.compass-ring{
    position:absolute;
    inset:0;
    border:2px solid rgba(153,144,119,0.2);
    border-radius:50%;
}

.compass-ticks{
    position:absolute;
    inset:0;
}

.compass-tick{
    position:absolute;
    top:0;
    left:50%;
    width:1px;
    height:8px;
    background:rgba(153,144,119,0.3);
    transform-origin:center 60px;
}

.compass-direction{
    position:absolute;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.65rem;
    font-weight:600;
    color:rgba(153,144,119,0.4);
    letter-spacing:0.05em;
}
.compass-direction.n{top:4px;left:50%;transform:translateX(-50%)}
.compass-direction.e{top:50%;right:4px;transform:translateY(-50%)}
.compass-direction.s{bottom:4px;left:50%;transform:translateX(-50%)}
.compass-direction.w{top:50%;left:4px;transform:translateY(-50%)}

.compass-direction.s.hot{color:var(--primary-container);text-shadow:0 0 8px rgba(255,215,0,0.5)}

.compass-arrow{
    position:absolute;
    top:50%;
    left:50%;
    width:3px;
    height:44px;
    background:linear-gradient(to top,var(--outline),rgba(153,144,119,0.5));
    transform-origin:bottom center;
    transform:translate(-50%,-100%) rotate(0deg);
    transition:all .3s;
    border-radius:2px;
}
.compass-arrow::after{
    content:'';
    position:absolute;
    top:-8px;
    left:50%;
    transform:translateX(-50%);
    border-left:6px solid transparent;
    border-right:6px solid transparent;
    border-bottom:10px solid var(--outline);
}
.compass-arrow.hot{
    background:linear-gradient(to top,var(--primary-container),rgba(255,215,0,0.5));
}
.compass-arrow.hot::after{
    border-bottom-color:var(--primary-container);
}

.compass-readout{
    font-family:'Space Grotesk',monospace;
    font-size:0.75rem;
    color:var(--outline);
    letter-spacing:0.1em;
}
.compass-readout.hot{color:var(--primary-container)}

/* === SCANNER READOUT (TOP) === */
.scanner-readout{
    position:fixed;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    text-align:center;
    font-family:'Space Grotesk',monospace;
    font-size:0.7rem;
    color:var(--outline);
    letter-spacing:0.1em;
    opacity:0;
    transition:opacity .5s;
}
.scanner-readout.active{opacity:1}

.readout-line{
    margin:4px 0;
    display:flex;
    justify-content:center;
    gap:8px;
}

.readout-label{
    color:rgba(153,144,119,0.5);
    min-width:70px;
    text-align:right;
}

.readout-value{
    color:var(--on-surface-variant);
    min-width:60px;
    text-align:left;
}
.readout-value.hot{color:var(--primary-container)}
.readout-value.locking{color:var(--secondary-container)}

/* === VU METER (ANALOG SIGNAL BARS) === */
.vu-meter{
    position:fixed;
    top:50%;
    right:16px;
    transform:translateY(-50%);
    z-index:20;
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
    gap:3px;
    padding:12px 8px;
    background:rgba(0,0,0,0.3);
    border-radius:8px;
    border:1px solid rgba(153,144,119,0.1);
}

.vu-label{
    font-family:'Space Grotesk',sans-serif;
    font-size:0.55rem;
    color:var(--outline);
    letter-spacing:0.1em;
    margin-bottom:4px;
    writing-mode:vertical-rl;
    text-orientation:mixed;
}

.vu-bar{
    width:16px;
    border-radius:2px;
    transition:all .15s;
    background:rgba(153,144,119,0.15);
}
.vu-bar.active-green{background:rgba(0,227,253,0.4);box-shadow:0 0 4px rgba(0,227,253,0.3)}
.vu-bar.active-yellow{background:rgba(255,215,0,0.5);box-shadow:0 0 4px rgba(255,215,0,0.4)}
.vu-bar.active-red{background:rgba(255,100,50,0.6);box-shadow:0 0 6px rgba(255,100,50,0.5)}

/* === OSCILLOSCOPE === */
.oscilloscope{
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    width:200px;
    height:60px;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(153,144,119,0.15);
    border-radius:8px;
    overflow:hidden;
    opacity:0;
    transition:opacity .5s;
}
.oscilloscope.active{opacity:1}

#oscilloscope-canvas{
    width:100%;
    height:100%;
}

/* === FREQUENCY DIAL === */
.freq-dial{
    position:fixed;
    top:50%;
    left:16px;
    transform:translateY(-50%);
    z-index:20;
    width:60px;
    height:60px;
    opacity:0;
    transition:opacity .5s;
}
.freq-dial.active{opacity:1}

.dial-ring{
    width:100%;
    height:100%;
    border-radius:50%;
    border:2px solid rgba(153,144,119,0.2);
    position:relative;
}

.dial-marker{
    position:absolute;
    top:50%;
    left:50%;
    width:2px;
    height:26px;
    background:var(--outline);
    transform-origin:bottom center;
    transform:translate(-50%,-100%) rotate(0deg);
    transition:all .3s;
    border-radius:1px;
}
.dial-marker.hot{background:var(--primary-container)}

.dial-value{
    position:absolute;
    bottom:-20px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Space Grotesk',monospace;
    font-size:0.6rem;
    color:var(--outline);
    white-space:nowrap;
}
.dial-value.hot{color:var(--primary-container)}

/* === SIGNAL PORTAL (CENTER) === */
.portal-container{
    position:relative;
    width:300px;
    height:300px;
    margin:20px 0;
}

.portal-ring{
    position:absolute;
    inset:0;
    border:1px solid rgba(153,144,119,0.1);
    border-radius:50%;
    animation:portalRotate 20s linear infinite;
}
.portal-ring:nth-child(2){inset:30px;animation-delay:-5s;animation-duration:15s}
.portal-ring:nth-child(3){inset:60px;animation-delay:-10s;animation-duration:25s}
@keyframes portalRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.portal-sweep{
    position:absolute;
    inset:0;
    border-radius:50%;
    overflow:hidden;
}
.portal-sweep::after{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    width:50%;
    height:1px;
    background:linear-gradient(90deg,rgba(0,227,253,0.4),transparent);
    transform-origin:left center;
    animation:sweep 3s linear infinite;
}
@keyframes sweep{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* Ellipse video portal */
.portal-core{
    position:absolute;
    inset:50%;
    width:140px;
    height:180px;
    margin:-70px -90px;
    border-radius:50%;
    overflow:hidden;
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(255,246,223,0.1);
    transition:all .6s ease;
    display:flex;
    align-items:center;
    justify-content:center;
}

.portal-core.locking{
    border-color:rgba(0,227,253,0.4);
    box-shadow:0 0 40px rgba(0,227,253,0.2),0 0 80px rgba(0,227,253,0.1);
    transform:scale(1.2);
}

.portal-core.locked{
    border-color:rgba(0,227,253,0.6);
    box-shadow:0 0 60px rgba(0,227,253,0.4),0 0 120px rgba(0,227,253,0.2);
    transform:scale(1.4);
    animation:portalBreath 3s ease-in-out infinite;
}
@keyframes portalBreath{0%,100%{box-shadow:0 0 60px rgba(0,227,253,0.4)}50%{box-shadow:0 0 80px rgba(0,227,253,0.6)}}

#portalVideo{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1s;
    filter:contrast(1.2) saturate(1.3) hue-rotate(-10deg);
}
#portalVideo.active{opacity:1}

#portalVideo.glitching{
    animation:videoGlitch 0.15s infinite;
}
@keyframes videoGlitch{
    0%{transform:translate(0);filter:hue-rotate(0deg)}
    25%{transform:translate(-2px,1px);filter:hue-rotate(30deg)}
    50%{transform:translate(2px,-1px);filter:hue-rotate(-20deg)}
    75%{transform:translate(-1px,2px);filter:hue-rotate(10deg)}
    100%{transform:translate(0);filter:hue-rotate(0deg)}
}

.portal-placeholder{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle,rgba(0,227,253,0.1),transparent 70%);
}

.placeholder-text{
    font-family:'Space Grotesk',sans-serif;
    font-size:0.7rem;
    color:var(--outline);
    letter-spacing:0.15em;
    text-transform:uppercase;
    text-align:center;
    line-height:1.6;
}

.placeholder-pulse{
    width:30px;
    height:30px;
    border-radius:50%;
    background:rgba(0,227,253,0.2);
    margin-bottom:12px;
    animation:placeholderPulse 2s infinite;
}
@keyframes placeholderPulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.3);opacity:1}}

.freq-overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Space Grotesk',sans-serif;
    font-size:1.5rem;
    font-weight:700;
    color:var(--on-surface-variant);
    transition:all .3s;
    z-index:5;
    pointer-events:none;
}
.freq-overlay.hot{color:var(--primary);text-shadow:0 0 20px rgba(255,246,223,.3)}
.freq-overlay.locking{color:var(--secondary-container);text-shadow:0 0 30px rgba(0,227,253,.5)}

/* === INTERFERENCE (KAZANTIP THEMED) === */
.interference{
    position:fixed;
    inset:0;
    z-index:15;
    pointer-events:none;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .2s;
    background:rgba(0,0,0,0.3);
}
.interference.active{opacity:1}

.interference-box{
    padding:20px 40px;
    border:1px solid rgba(255,215,0,0.3);
    background:rgba(0,0,0,0.7);
    text-align:center;
}

.interference-text{
    font-family:'Space Grotesk',sans-serif;
    font-size:0.85rem;
    color:var(--primary-container);
    text-shadow:0 0 15px rgba(255,215,0,0.5);
    letter-spacing:0.2em;
    text-transform:uppercase;
    animation:interferenceFlicker 0.1s infinite;
}
@keyframes interferenceFlicker{0%,100%{opacity:1}50%{opacity:0.2}}

/* === SCAN LINE === */
.scan-line{
    position:fixed;
    left:0;
    right:0;
    height:2px;
    background:linear-gradient(90deg,transparent,rgba(0,227,253,0.3),transparent);
    z-index:7;
    pointer-events:none;
    opacity:0;
    transition:opacity .2s;
}
.scan-line.active{opacity:1}

/* === LOCK BUTTON === */
.lock-btn{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    padding:16px 48px;
    background:var(--primary-container);
    color:var(--on-primary-container);
    border:none;
    border-radius:12px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.85rem;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:all .4s cubic-bezier(0.4,0,0.2,1);
    box-shadow:0 4px 24px rgba(255,215,0,0.3);
    z-index:20;
}
.lock-btn.visible{
    opacity:1;
    pointer-events:auto;
    transform:translateX(-50%) translateY(0);
}
.lock-btn:hover{
    box-shadow:0 4px 30px rgba(255,215,0,0.5),0 0 60px rgba(255,215,0,0.2);
}

/* === STAGE 2: FORM === */
#stage2{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 1s cubic-bezier(0.4,0,0.2,1);
    z-index:50;
    padding:20px;
}
#stage2.active{opacity:1;pointer-events:auto}

.glass-strong{
    background:rgba(52,52,58,0.4);
    backdrop-filter:blur(40px);
    -webkit-backdrop-filter:blur(40px);
    border:1px solid rgba(255,255,255,0.12);
}

.form-container{
    width:100%;
    max-width:420px;
    padding:48px;
    border-radius:16px;
}

.form-title{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.75rem;
    font-weight:600;
    letter-spacing:-0.02em;
    color:var(--primary);
    margin-bottom:8px;
    text-align:center;
}

.form-subtitle{
    font-family:'Inter',sans-serif;
    font-size:0.9375rem;
    color:var(--on-surface-variant);
    margin-bottom:40px;
    text-align:center;
}

.form-group{
    margin-bottom:24px;
}

.form-group label{
    display:block;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.6875rem;
    font-weight:500;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--on-surface-variant);
    margin-bottom:10px;
}

.form-group input{
    width:100%;
    padding:14px 16px;
    background:rgba(13,14,19,0.8);
    border:1px solid rgba(153,144,119,0.2);
    border-radius:12px;
    color:var(--on-surface);
    font-family:'Inter',sans-serif;
    font-size:0.9375rem;
    outline:none;
    transition:all .3s ease;
}

.form-group input:focus{
    border-color:var(--secondary-container);
    box-shadow:0 0 0 3px rgba(0,227,253,0.1),0 0 20px rgba(0,227,253,0.1);
}

.form-group input::placeholder{
    color:rgba(153,144,119,0.4);
}

.submit-btn{
    width:100%;
    padding:16px;
    background:var(--primary-container);
    color:var(--on-primary-container);
    border:none;
    border-radius:12px;
    font-family:'Space Grotesk',sans-serif;
    font-size:0.875rem;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .3s ease;
    margin-top:16px;
}

.submit-btn:hover{
    box-shadow:0 4px 24px rgba(255,215,0,0.4),0 0 40px rgba(255,215,0,0.15);
    transform:translateY(-1px);
}

/* === NOISE OVERLAY === */
.noise{
    position:fixed;
    inset:0;
    z-index:4;
    pointer-events:none;
    opacity:.02;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* === DEBUG === */
#dbg{
    position:fixed;
    bottom:10px;
    right:10px;
    font-size:9px;
    color:rgba(153,144,119,0.3);
    z-index:100;
    font-family:monospace;
    text-align:right;
    line-height:1.4;
}
</style>
</head>
<body>

<div class="celestial-bg"></div>
<div class="stars" id="stars"></div>
<div class="moon" id="moon"></div>
<div class="moon-target" id="moonTarget"></div>
<div class="scanlines"></div>
<div class="crt-flicker"></div>
<div class="noise"></div>

<canvas id="tv-static"></canvas>

<div class="scan-line" id="scanLine"></div>

<div class="interference" id="interference">
    <div class="interference-box">
        <div class="interference-text" id="interferenceText">АРБУЗ ДЕТЕКТЕД</div>
    </div>
</div>

<!-- STAGE 1: Signal Detection -->
<div id="stage1">
    
    <div class="scanner-readout" id="scannerReadout">
        <div class="readout-line">
            <span class="readout-label">AZIMUTH</span>
            <span class="readout-value" id="readoutAlpha">---</span>
        </div>
        <div class="readout-line">
            <span class="readout-label">ELEVATION</span>
            <span class="readout-value" id="readoutBeta">---</span>
        </div>
        <div class="readout-line">
            <span class="readout-label">SIGNAL</span>
            <span class="readout-value" id="readoutSignal">SCANNING</span>
        </div>
    </div>
    
    <div class="status-bar">
        <div class="status-pill" id="statusPill">
            <div class="status-dot" id="statusDot"></div>
            <span class="label" id="statusText">ОЖИДАНИЕ СИГНАЛА</span>
        </div>
    </div>
    
    <div id="setup" class="start-screen">
        <div class="display-xl" id="mainTitle">SOOON</div>
        <button class="start-btn" id="startBtn">Поймать Сигнал</button>
        <div class="start-hint">
            НАПРАВЬ ТЕЛЕФОН НА ЮГ<br>
            ПОДНИМИ К НЕБУ — К ЛУНЕ<br>
            <span style="opacity:0.5">ИСКАТЬ КРИСТАЛЛ</span>
        </div>
    </div>
    
    <div id="gameUI" style="display:none;flex-direction:column;align-items:center;width:100%">
        
        <div class="portal-container">
            <div class="portal-ring"></div>
            <div class="portal-ring"></div>
            <div class="portal-ring"></div>
            <div class="portal-sweep"></div>
            
            <div class="portal-core" id="portalCore">
                <video id="portalVideo" loop muted playsinline>
                    <source src="signal-portal.mp4" type="video/mp4">
                </video>
                
                <div class="portal-placeholder" id="portalPlaceholder">
                    <div class="placeholder-pulse"></div>
                    <div class="placeholder-text">
                        ВИДЕО<br>СИГНАЛА<br>ЗДЕСЬ
                    </div>
                </div>
                
                <div class="freq-overlay" id="freqOverlay">0%</div>
            </div>
        </div>
        
        <!-- VU Meter -->
        <div class="vu-meter" id="vuMeter">
            <div class="vu-label">SIG</div>
            <div class="vu-bar" style="height:6px"></div>
            <div class="vu-bar" style="height:10px"></div>
            <div class="vu-bar" style="height:14px"></div>
            <div class="vu-bar" style="height:18px"></div>
            <div class="vu-bar" style="height:22px"></div>
            <div class="vu-bar" style="height:26px"></div>
            <div class="vu-bar" style="height:30px"></div>
            <div class="vu-bar" style="height:34px"></div>
        </div>
        
        <!-- Oscilloscope -->
        <div class="oscilloscope" id="oscilloscope">
            <canvas id="oscilloscope-canvas"></canvas>
        </div>
        
        <!-- Frequency Dial -->
        <div class="freq-dial" id="freqDial">
            <div class="dial-ring">
                <div class="dial-marker" id="dialMarker"></div>
            </div>
            <div class="dial-value" id="dialValue">87.5 MHz</div>
        </div>
        
        <!-- Compass -->
        <div class="compass-container" id="compassContainer">
            <div class="compass">
                <div class="compass-ring"></div>
                <div class="compass-ticks" id="compassTicks"></div>
                <div class="compass-direction n">N</div>
                <div class="compass-direction e">E</div>
                <div class="compass-direction s" id="compassS">S</div>
                <div class="compass-direction w">W</div>
                <div class="compass-arrow" id="compassArrow"></div>
            </div>
            <div class="compass-readout" id="compassReadout">000°</div>
        </div>
        
        <button class="lock-btn" id="lockBtn">Фиксировать Сигнал</button>
    </div>
</div>

<!-- STAGE 2: Form -->
<div id="stage2">
    <div class="form-container glass-strong">
        <div class="form-title">Вступить в Республику</div>
        <div class="form-subtitle">Оставь координаты для получения Визы</div>
        <form id="entryForm">
            <div class="form-group">
                <label>Instagram</label>
                <input type="text" id="ig" placeholder="@username" required>
            </div>
            <div class="form-group">
                <label>Город</label>
                <input type="text" id="city" placeholder="Москва" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="signal@example.com" required>
            </div>
            <button type="submit" class="submit-btn">Начать Ритуал</button>
        </form>
    </div>
</div>

<div id="dbg"></div>

<script>
// === STAR FIELD ===
const starsContainer = document.getElementById('stars');
for(let i = 0; i < 60; i++){
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 2) + 's';
    starsContainer.appendChild(star);
}

// === COMPASS TICKS ===
const ticksContainer = document.getElementById('compassTicks');
for(let i = 0; i < 12; i++){
    const tick = document.createElement('div');
    tick.className = 'compass-tick';
    tick.style.transform = `rotate(${i * 30}deg)`;
    ticksContainer.appendChild(tick);
}

// === TV STATIC CANVAS ===
const staticCanvas = document.getElementById('tv-static');
const staticCtx = staticCanvas.getContext('2d');
let staticActive = false;

function resizeStatic(){
    staticCanvas.width = window.innerWidth;
    staticCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeStatic);
resizeStatic();

function drawStatic(){
    if(!staticActive) return;
    const idata = staticCtx.createImageData(staticCanvas.width, staticCanvas.height);
    const buffer = new Uint32Array(idata.data.buffer);
    for(let i = 0; i < buffer.length; i++){
        const v = Math.random() * 255;
        buffer[i] = (255 << 24) | (v << 16) | (v << 8) | v;
    }
    staticCtx.putImageData(idata, 0, 0);
    requestAnimationFrame(drawStatic);
}

// === OSCILLOSCOPE ===
const oscCanvas = document.getElementById('oscilloscope-canvas');
const oscCtx = oscCanvas.getContext('2d');
let oscActive = false;

function resizeOsc(){
    const rect = oscCanvas.parentElement.getBoundingClientRect();
    oscCanvas.width = rect.width;
    oscCanvas.height = rect.height;
}

function drawOscilloscope(signalStrength){
    if(!oscActive) return;
    const w = oscCanvas.width;
    const h = oscCanvas.height;
    
    oscCtx.fillStyle = 'rgba(0,0,0,0.1)';
    oscCtx.fillRect(0, 0, w, h);
    
    oscCtx.strokeStyle = signalStrength > 80 ? 'rgba(0,227,253,0.6)' : 
                         signalStrength > 50 ? 'rgba(255,215,0,0.5)' : 'rgba(153,144,119,0.3)';
    oscCtx.lineWidth = 1.5;
    oscCtx.beginPath();
    
    const time = Date.now() / 1000;
    const amplitude = signalStrength / 100;
    const noise = (1 - amplitude) * 0.5;
    
    for(let x = 0; x < w; x++){
        const normalizedX = x / w;
        const wave = Math.sin(normalizedX * 10 + time * 5) * amplitude * h * 0.4;
        const staticNoise = (Math.random() - 0.5) * noise * h * 0.3;
        const y = h / 2 + wave + staticNoise;
        
        if(x === 0) oscCtx.moveTo(x, y);
        else oscCtx.lineTo(x, y);
    }
    
    oscCtx.stroke();
    requestAnimationFrame(() => drawOscilloscope(signalStrength));
}

// === GAME STATE ===
let signalLocked = false;
let gameActive = false;

// Target: South (alpha ~180°), elevation ~60-80° (phone pointing UP at moon)
const TARGET_ALPHA = 180;
const TARGET_BETA = 70;
const ALPHA_TOLERANCE = 40;
const BETA_TOLERANCE = 25;

let currentAlpha = 0;
let currentBeta = 0;
let signalStrength = 0;
let inHotZone = false;
let hotZoneTimer = null;

// Kazantip-themed interference messages
const interferenceMessages = [
    "АРБУЗ ДЕТЕКТЕД",
    "ГОРБУШКА 1999",
    "СИГНАЛ ИЗ РЕСПУБЛИКИ",
    "КРИСТАЛЛ ВОССТАНОВЛЕН",
    "ЧАСТОТА КАЗАНТИПА",
    "ВИЗА ОДОБРЕНА",
    "DREEMZ TRANSMISSION",
    "Z-СИГНАЛ ПРИНЯТ",
    "ПОРТАЛ ОТКРЫТ",
    "ДРУГАЯ РЕАЛЬНОСТЬ",
    "СЕРГЕЙ И МАРИЯ",
    "КИСЛОВОДСК КОННЕКТ",
    "КВАНТОВЫЙ КРИСТАЛЛ"
];

const startBtn = document.getElementById('startBtn');
const setup = document.getElementById('setup');
const gameUI = document.getElementById('gameUI');
const statusText = document.getElementById('statusText');
const statusDot = document.getElementById('statusDot');
const statusPill = document.getElementById('statusPill');
const portalCore = document.getElementById('portalCore');
const portalVideo = document.getElementById('portalVideo');
const portalPlaceholder = document.getElementById('portalPlaceholder');
const freqOverlay = document.getElementById('freqOverlay');
const lockBtn = document.getElementById('lockBtn');
const moon = document.getElementById('moon');
const moonTarget = document.getElementById('moonTarget');
const interference = document.getElementById('interference');
const interferenceText = document.getElementById('interferenceText');
const scannerReadout = document.getElementById('scannerReadout');
const readoutAlpha = document.getElementById('readoutAlpha');
const readoutBeta = document.getElementById('readoutBeta');
const readoutSignal = document.getElementById('readoutSignal');
const compassArrow = document.getElementById('compassArrow');
const compassReadout = document.getElementById('compassReadout');
const compassS = document.getElementById('compassS');
const vuBars = document.querySelectorAll('.vu-bar');
const scanLine = document.getElementById('scanLine');
const dialMarker = document.getElementById('dialMarker');
const dialValue = document.getElementById('dialValue');
const oscilloscope = document.getElementById('oscilloscope');
const freqDial = document.getElementById('freqDial');
const vuMeter = document.getElementById('vuMeter');
const compassContainer = document.getElementById('compassContainer');
const dbg = document.getElementById('dbg');

function updateSignalStrength(){
    let alphaDiff = Math.abs(currentAlpha - TARGET_ALPHA);
    if(alphaDiff > 180) alphaDiff = 360 - alphaDiff;
    
    const betaDiff = Math.abs(currentBeta - TARGET_BETA);
    
    const alphaProximity = Math.max(0, 1 - alphaDiff / ALPHA_TOLERANCE);
    const betaProximity = Math.max(0, 1 - betaDiff / BETA_TOLERANCE);
    
    signalStrength = Math.min(alphaProximity, betaProximity) * 100;
    
    updateUI(alphaDiff, betaDiff);
    
    if(signalStrength < 50 && Math.random() < 0.03){
        showInterference();
    }
}

function updateUI(alphaDiff, betaDiff){
    freqOverlay.innerText = Math.round(signalStrength) + '%';
    
    readoutAlpha.innerText = Math.round(currentAlpha) + '°';
    readoutBeta.innerText = Math.round(currentBeta) + '°';
    
    // Compass arrow rotation
    compassArrow.style.transform = `translate(-50%,-100%) rotate(${currentAlpha}deg)`;
    compassReadout.innerText = Math.round(currentAlpha).toString().padStart(3, '0') + '°';
    
    // Frequency dial
    const dialRotation = (signalStrength / 100) * 270 - 135;
    dialMarker.style.transform = `translate(-50%,-100%) rotate(${dialRotation}deg)`;
    dialValue.innerText = (87.5 + signalStrength * 0.15).toFixed(1) + ' MHz';
    
    // VU meter
    const activeBars = Math.floor(signalStrength / 12.5);
    vuBars.forEach((bar, i) => {
        bar.className = 'vu-bar';
        if(i < activeBars){
            if(i >= 6) bar.classList.add('active-red');
            else if(i >= 4) bar.classList.add('active-yellow');
            else bar.classList.add('active-green');
        }
    });
    
    if(signalStrength > 90){
        statusText.innerText = 'СИГНАЛ НАЙДЕН';
        statusDot.className = 'status-dot locking';
        statusPill.className = 'status-pill locking';
        freqOverlay.className = 'freq-overlay locking';
        readoutSignal.innerText = 'LOCKING';
        readoutSignal.className = 'readout-value locking';
        portalCore.className = 'portal-core locking';
        compassS.classList.add('hot');
        compassArrow.classList.add('hot');
        compassReadout.classList.add('hot');
        dialMarker.classList.add('hot');
        dialValue.classList.add('hot');
        moon.classList.add('glow');
        moonTarget.classList.add('active');
        portalPlaceholder.style.opacity = '0';
        
        if(!inHotZone && !signalLocked){
            inHotZone = true;
            lockBtn.classList.add('visible');
            hotZoneTimer = setTimeout(() => {
                if(!signalLocked) lockSignal();
            }, 3000);
        }
    } else if(signalStrength > 50){
        statusText.innerText = 'ПРИБЛИЖЕНИЕ...';
        statusDot.className = 'status-dot near';
        statusPill.className = 'status-pill';
        freqOverlay.className = 'freq-overlay hot';
        readoutSignal.innerText = 'NEAR';
        readoutSignal.className = 'readout-value hot';
        portalCore.className = 'portal-core';
        compassS.classList.remove('hot');
        compassArrow.classList.add('hot');
        compassReadout.classList.remove('hot');
        dialMarker.classList.remove('hot');
        dialValue.classList.remove('hot');
        moon.classList.remove('glow');
        moonTarget.classList.remove('active');
        portalPlaceholder.style.opacity = '1';
        
        inHotZone = false;
        lockBtn.classList.remove('visible');
        clearTimeout(hotZoneTimer);
    } else {
        statusText.innerText = 'ПОИСК ЧАСТОТЫ';
        statusDot.className = 'status-dot scanning';
        statusPill.className = 'status-pill';
        freqOverlay.className = 'freq-overlay';
        readoutSignal.innerText = 'SCANNING';
        readoutSignal.className = 'readout-value';
        portalCore.className = 'portal-core';
        compassS.classList.remove('hot');
        compassArrow.classList.remove('hot');
        compassReadout.classList.remove('hot');
        dialMarker.classList.remove('hot');
        dialValue.classList.remove('hot');
        moon.classList.remove('glow');
        moonTarget.classList.remove('active');
        portalPlaceholder.style.opacity = '1';
        
        inHotZone = false;
        lockBtn.classList.remove('visible');
        clearTimeout(hotZoneTimer);
    }
}

function showInterference(){
    const msg = interferenceMessages[Math.floor(Math.random() * interferenceMessages.length)];
    interferenceText.innerText = msg;
    interference.classList.add('active');
    
    scanLine.style.top = Math.random() * 100 + '%';
    scanLine.classList.add('active');
    
    setTimeout(() => {
        interference.classList.remove('active');
        scanLine.classList.remove('active');
    }, 200 + Math.random() * 300);
}

function lockSignal(){
    if(signalLocked) return;
    signalLocked = true;
    clearTimeout(hotZoneTimer);
    
    statusText.innerText = 'СИГНАЛ ПОЙМАН';
    readoutSignal.innerText = 'LOCKED';
    freqOverlay.innerText = 'LOCK';
    
    portalCore.className = 'portal-core locked';
    portalPlaceholder.style.opacity = '0';
    
    portalVideo.classList.add('active');
    portalVideo.classList.add('glitching');
    setTimeout(() => portalVideo.classList.remove('glitching'), 600);
    
    if(navigator.vibrate) navigator.vibrate([100,50,100,50,200,100,300]);
    
    setTimeout(() => {
        document.getElementById('stage1').classList.add('hidden');
        document.getElementById('stage2').classList.add('active');
    }, 2000);
}

lockBtn.addEventListener('click', lockSignal);

// === START ===
startBtn.addEventListener('click', () => {
    setup.style.display = 'none';
    gameUI.style.display = 'flex';
    gameActive = true;
    statusText.innerText = 'ПОИСК ЧАСТОТЫ';
    scannerReadout.classList.add('active');
    oscilloscope.classList.add('active');
    freqDial.classList.add('active');
    vuMeter.style.opacity = '1';
    compassContainer.style.opacity = '1';
    
    staticActive = true;
    staticCanvas.classList.add('active');
    drawStatic();
    
    resizeOsc();
    oscActive = true;
    drawOscilloscope(0);
    
    if(typeof DeviceOrientationEvent !== 'undefined'){
        if(typeof DeviceOrientationEvent.requestPermission === 'function'){
            DeviceOrientationEvent.requestPermission().then(response => {
                if(response === 'granted'){
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }).catch(() => {});
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
    }
    
    simulateScanning();
});

function handleOrientation(e){
    if(e.alpha !== null) currentAlpha = e.alpha;
    // Invert beta: phone UP (toward sky/moon) = high value
    if(e.beta !== null) currentBeta = 180 - Math.abs(e.beta);
    if(e.gamma !== null) currentBeta = Math.max(currentBeta, Math.abs(e.gamma));
    
    if(gameActive) updateSignalStrength();
    
    dbg.innerHTML = `α:${Math.round(currentAlpha)}° β:${Math.round(currentBeta)}°<br>sig:${Math.round(signalStrength)}%`;
}

function simulateScanning(){
    if(typeof DeviceOrientationEvent === 'undefined'){
        let simulatedAlpha = 0;
        let simulatedBeta = 30;
        
        window.addEventListener('touchmove', (e) => {
            const x = e.touches[0].clientX / window.innerWidth;
            const y = e.touches[0].clientY / window.innerHeight;
            
            simulatedAlpha = x * 360;
            simulatedBeta = 30 + (1 - y) * 120;
            
            currentAlpha = simulatedAlpha;
            currentBeta = simulatedBeta;
            updateSignalStrength();
        }, {passive:true});
        
        let scanDirection = 1;
        setInterval(() => {
            if(!gameActive || signalLocked) return;
            
            simulatedAlpha += 2 * scanDirection;
            if(simulatedAlpha > 360) simulatedAlpha = 0;
            
            simulatedBeta = 50 + Math.sin(Date.now() / 1000) * 40;
            
            currentAlpha = simulatedAlpha;
            currentBeta = simulatedBeta;
            updateSignalStrength();
        }, 50);
    }
}

// === FORM ===
document.getElementById('entryForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const data = {
        instagram: document.getElementById('ig').value,
        city: document.getElementById('city').value,
        email: document.getElementById('email').value
    };
    localStorage.setItem('kazantip_applicant', JSON.stringify(data));
    window.location.href = `interview.html?ig=${encodeURIComponent(data.instagram)}&city=${encodeURIComponent(data.city)}&email=${encodeURIComponent(data.email)}`;
});

// === TITLE FLICKER ===
setInterval(() => {
    if(Math.random() > 0.95){
        document.getElementById('mainTitle').style.opacity = 0.3;
        setTimeout(() => document.getElementById('mainTitle').style.opacity = 1, 50);
    }
}, 100);
</script>
</body>
</html>
